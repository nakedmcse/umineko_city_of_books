services:
  postgres:
    image: postgres:latest
    container_name: umineko-postgres
    restart: unless-stopped
    env_file:
      - postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5007:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  umineko-city-of-books:
    image: ghcr.io/victoriquemoe/umineko_city_of_books:latest
    container_name: umineko-city-of-books
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "2312:4323"
    env_file:
      - .env
      - postgres.env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

  glitchtip-postgres:
    image: postgres:18
    container_name: glitchtip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_HOST_AUTH_METHOD: "trust"
    volumes:
      - glitchtip-pg-data:/var/lib/postgresql

  glitchtip:
    image: glitchtip/glitchtip:6
    container_name: glitchtip
    restart: unless-stopped
    depends_on:
      - glitchtip-postgres
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env.glitchtip
    volumes:
      - glitchtip-uploads:/code/uploads

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    restart: unless-stopped
    command:
      - "-config.file=/etc/tempo/tempo.yaml"
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo

  pyroscope:
    image: grafana/pyroscope:latest
    container_name: pyroscope
    restart: unless-stopped
    volumes:
      - pyroscope-data:/var/lib/pyroscope

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - tempo
      - pyroscope
    ports:
      - "127.0.0.1:4124:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  postgres_data:
  glitchtip-pg-data:
  glitchtip-uploads:
  prometheus-data:
  grafana-data:
  tempo-data:
  pyroscope-data:
